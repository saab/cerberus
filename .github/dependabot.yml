version: 2
updates:
  # Python dependencies of the approval-api (requirements.txt + requirements-dev.txt).
  - package-ecosystem: "pip"
    directory: "/approval-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Base images of all three Dockerfiles.
  - package-ecosystem: "docker"
    directories:
      - "/proxy"
      - "/approval-api"
      - "/tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-images:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # The GitHub Actions used by the workflows in this repo.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
