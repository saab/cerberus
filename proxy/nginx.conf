worker_processes auto;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS (for approval-api) + public resolvers (for PyPI hosts).
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
    resolver_timeout 5s;

    lua_package_path "/usr/local/openresty/lua/?.lua;;";
    lua_shared_dict approvals 1m;

    # Cache upstream TLS sessions; trust the system CA bundle for proxy_ssl.
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 3;

    access_log /dev/stdout;

    server {
        listen 8080;
        server_name _;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # PyPI simple index. Gatekeep by package name, then pull through from
        # pypi.org and rewrite file URLs back through this proxy's /files/.
        location ~ ^/simple/(?<pkg>[^/]+)/?$ {
            access_by_lua_file /usr/local/openresty/lua/gatekeeper.lua;

            proxy_pass https://pypi.org;
            proxy_set_header Host pypi.org;
            proxy_set_header Accept-Encoding "";   # so sub_filter can rewrite the body

            # Validate the upstream TLS certificate (nginx defaults this OFF).
            # A failed handshake aborts the request rather than serving unverified data.
            proxy_ssl_server_name on;
            proxy_ssl_name pypi.org;
            proxy_ssl_verify on;
            proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
            proxy_ssl_verify_depth 3;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            sub_filter_once off;
            sub_filter_types text/html application/vnd.pypi.simple.v1+json;
            sub_filter "https://files.pythonhosted.org" "http://$http_host/files";
        }

        # Pull-through for the actual package artifacts. The Lua handler fetches
        # the file, verifies its sha256 against the package's approved hash set,
        # and only then serves the (byte-identical) bytes -- otherwise 403.
        location /files/ {
            content_by_lua_file /usr/local/openresty/lua/serve_file.lua;
        }
    }
}
